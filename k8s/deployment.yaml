# uses docker images
# create one pod
apiVersion: apps/v1
kind: Deployment

metadata:
  name: express-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: express-backend

  template:
    metadata:
      labels:
        app: express-backend

    spec:
      containers:
        - name: express-container
          image: harshy109/demo-app:latest

          ports:
            - containerPort: 4000